name: build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
      with:
        dotnet-version: '10.0.x' # SDK Version to use.

    - run: dotnet publish -c release -r win-x64 -o out
      working-directory: ./procgov

    - name: Copy artifacts
      run: |
        New-Item -Type Directory -Path artifacts
        Copy-Item -Path "procgov/out/procgov.exe" -Destination "artifacts/procgov.exe"
        Copy-Item -Path "procgov/out/procgov.pdb" -Destination "artifacts/procgov.pdb"
        Copy-Item -Path "procgov/out/procgov-lib.pdb" -Destination "artifacts/procgov-lib.pdb"

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: procgov
        path: artifacts/*
